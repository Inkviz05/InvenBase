services:
  postgres-smoke:
    image: postgres:16-alpine
    container_name: invenbase-postgres-smoke
    environment:
      POSTGRES_DB: kvantoriym_smoke
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kvantoriym_smoke"]
      interval: 5s
      timeout: 5s
      retries: 12
